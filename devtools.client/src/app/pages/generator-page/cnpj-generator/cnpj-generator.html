<div class="generator-container">
  <form [formGroup]="form">
    <mat-slide-toggle formControlName="mask">Apply mask</mat-slide-toggle>
    <mat-slide-toggle formControlName="alphanumeric">Alphanumeric</mat-slide-toggle>
    <button matButton type="button" (click)="generate()">
      Generate
    </button>
  </form>
  @if (output) {
    <div class="output-container">
      <dt-clipboard-output [output]="output"></dt-clipboard-output>
    </div>
  }
</div>
