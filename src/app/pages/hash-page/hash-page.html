<h1>Hash</h1>
<mat-divider></mat-divider>

<dt-input-selector
  (valueSubmited)="setInputAndComputeHash($event)"
  (valueReseted)="resetValue()"
  submitButtonText="Compute hash"
></dt-input-selector>

@if (value()) {
  <form [formGroup]="form">
    <div>
      <h3>Hash algorithm</h3>
      <mat-button-toggle-group formControlName="hashType" class="stretch input-type-selector">
        <mat-button-toggle class="stretch" value="md5">MD5</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha1">SHA-1</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha256">SHA-256</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha384">SHA-384</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha512">SHA-512</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </form>

  <dt-output-selector
    [allowedTypes]="['hex', 'b64']"
    [value]="outputValue()"
  ></dt-output-selector>
}
