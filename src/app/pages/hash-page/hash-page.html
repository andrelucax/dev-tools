<dt-input-selector
  (valueSubmited)="setInputAndComputeHash($event)"
  (valueReseted)="resetValue()"
  submitButtonText="Compute hash"
></dt-input-selector>

@if (value) {
  <form [formGroup]="form">
    <div>
      <h2>Hash algorithm</h2>
      <mat-button-toggle-group formControlName="hashType" class="stretch input-type-selector">
        <mat-button-toggle class="stretch" value="md5">MD5</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha1">SHA-1</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha256">SHA-256</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha384">SHA-384</mat-button-toggle>
        <mat-button-toggle class="stretch" value="sha512">SHA-512</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <div>
      <h2>Output type</h2>
      <mat-button-toggle-group formControlName="outputType" class="stretch input-type-selector">
        <mat-button-toggle class="stretch" value="utf8">UTF-8</mat-button-toggle>
        <mat-button-toggle class="stretch" value="b64">Base64</mat-button-toggle>
        <mat-button-toggle class="stretch" value="hex">Hex</mat-button-toggle>
        <mat-button-toggle class="stretch" value="file">File</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </form>

  <div class="output-container">
    <dt-clipboard-output [output]="value"></dt-clipboard-output>
  </div>
}
